<svg width="1280" height="760" viewBox="0 0 1280 760" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">DS-160 AI 面签模拟器架构图</title>
  <desc id="desc">展示 Next.js 工作台、FastAPI、Agent runtime、材料管线、RAG 知识库、Chroma、SiliconFlow、数据库和模型服务之间的关系。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="760" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset="0.52" stop-color="#EEF6F3"/>
      <stop offset="1" stop-color="#F7F1E8"/>
    </linearGradient>
    <linearGradient id="accent" x1="90" y1="80" x2="1175" y2="680" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F766E"/>
      <stop offset="0.45" stop-color="#2563EB"/>
      <stop offset="1" stop-color="#B45309"/>
    </linearGradient>
    <filter id="shadow" x="-18%" y="-18%" width="136%" height="136%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#1F2937" flood-opacity="0.13"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8.5" refY="5" orient="auto">
      <path d="M1 1L9 5L1 9" stroke="#405166" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="softArrow" markerWidth="10" markerHeight="10" refX="8.5" refY="5" orient="auto">
      <path d="M1 1L9 5L1 9" stroke="#64748B" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="1280" height="760" rx="34" fill="url(#bg)"/>
  <path d="M72 116C241 45 416 70 568 144C725 220 856 176 1015 108C1102 71 1166 82 1210 105" stroke="url(#accent)" stroke-width="7" stroke-linecap="round" opacity="0.16"/>
  <path d="M48 637C211 545 367 552 512 614C672 682 850 672 1015 588C1112 539 1181 551 1230 579" stroke="url(#accent)" stroke-width="7" stroke-linecap="round" opacity="0.14"/>

  <text x="64" y="66" fill="#102033" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="30" font-weight="760">DS-160 AI 面签模拟器</text>
  <text x="64" y="99" fill="#58677A" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16">面签追问、材料证据、政策 RAG、风险判断和报告生成在同一条可追踪链路中运行</text>

  <g filter="url(#shadow)">
    <rect x="64" y="145" width="236" height="178" rx="18" fill="#FFFFFF" stroke="#D8E2DC"/>
    <text x="92" y="184" fill="#0F766E" font-family="Inter, ui-sans-serif, system-ui" font-size="16" font-weight="760">Next.js Workbench</text>
    <text x="92" y="214" fill="#243244" font-family="Inter, ui-sans-serif, system-ui" font-size="14">会话 / 材料 / 报告 / 设置</text>
    <text x="92" y="241" fill="#64748B" font-family="Inter, ui-sans-serif, system-ui" font-size="13">面签式交互入口</text>
    <rect x="92" y="262" width="176" height="30" rx="15" fill="#ECFDF5"/>
    <text x="112" y="282" fill="#047857" font-family="Inter, ui-sans-serif, system-ui" font-size="12" font-weight="650">BYOK 对话模型配置</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="366" y="126" width="278" height="226" rx="18" fill="#FFFFFF" stroke="#D8E2DC"/>
    <text x="396" y="166" fill="#2563EB" font-family="Inter, ui-sans-serif, system-ui" font-size="16" font-weight="760">FastAPI API Layer</text>
    <text x="396" y="196" fill="#243244" font-family="Inter, ui-sans-serif, system-ui" font-size="14">Session / Message / File / Report</text>
    <text x="396" y="222" fill="#64748B" font-family="Inter, ui-sans-serif, system-ui" font-size="13">鉴权、路由、请求合同</text>
    <rect x="396" y="247" width="210" height="30" rx="15" fill="#EFF6FF"/>
    <text x="418" y="267" fill="#1D4ED8" font-family="Inter, ui-sans-serif, system-ui" font-size="12" font-weight="650">OpenAI-compatible API</text>
    <rect x="396" y="289" width="210" height="34" rx="17" fill="#F0FDFA"/>
    <text x="416" y="311" fill="#0F766E" font-family="Inter, ui-sans-serif, system-ui" font-size="12" font-weight="700">/v1/rag/status  /v1/rag/files</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="724" y="118" width="410" height="226" rx="22" fill="#FFFFFF" stroke="#D8E2DC"/>
    <text x="756" y="158" fill="#B45309" font-family="Inter, ui-sans-serif, system-ui" font-size="17" font-weight="760">Agent Runtime</text>
    <text x="756" y="188" fill="#243244" font-family="Inter, ui-sans-serif, system-ui" font-size="14">Interviewer Runtime + Governor</text>
    <text x="756" y="214" fill="#64748B" font-family="Inter, ui-sans-serif, system-ui" font-size="13">控制追问、补证、高风险复核与模拟拒签</text>

    <rect x="756" y="242" width="136" height="52" rx="14" fill="#ECFDF5" stroke="#B7E4D8"/>
    <text x="777" y="273" fill="#047857" font-family="Inter, ui-sans-serif, system-ui" font-size="13" font-weight="700">Policy Packs</text>

    <rect x="912" y="242" width="156" height="52" rx="14" fill="#FFF7ED" stroke="#FED7AA"/>
    <text x="931" y="273" fill="#B45309" font-family="Inter, ui-sans-serif, system-ui" font-size="13" font-weight="700">Runtime Policies</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="64" y="424" width="255" height="142" rx="18" fill="#FFFFFF" stroke="#D8E2DC"/>
    <text x="92" y="463" fill="#0F766E" font-family="Inter, ui-sans-serif, system-ui" font-size="16" font-weight="760">Document Pipeline</text>
    <text x="92" y="493" fill="#243244" font-family="Inter, ui-sans-serif, system-ui" font-size="14">材料识别、抽取、主线反馈</text>
    <text x="92" y="518" fill="#64748B" font-family="Inter, ui-sans-serif, system-ui" font-size="13">PDF / 图片 / 证据状态</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="382" y="430" width="255" height="132" rx="18" fill="#FFFFFF" stroke="#D8E2DC"/>
    <text x="410" y="469" fill="#2563EB" font-family="Inter, ui-sans-serif, system-ui" font-size="16" font-weight="760">SQLite / Repositories</text>
    <text x="410" y="499" fill="#243244" font-family="Inter, ui-sans-serif, system-ui" font-size="14">会话、材料、turn record</text>
    <text x="410" y="524" fill="#64748B" font-family="Inter, ui-sans-serif, system-ui" font-size="13">trace / score / governor history</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="724" y="420" width="252" height="158" rx="18" fill="#FFFFFF" stroke="#D8E2DC"/>
    <text x="752" y="459" fill="#7C3AED" font-family="Inter, ui-sans-serif, system-ui" font-size="16" font-weight="760">Visa Policy RAG</text>
    <text x="752" y="489" fill="#243244" font-family="Inter, ui-sans-serif, system-ui" font-size="14">Retrieval + Ingest Services</text>
    <text x="752" y="514" fill="#64748B" font-family="Inter, ui-sans-serif, system-ui" font-size="13">官方优先、metadata filter、rerank</text>
    <rect x="752" y="535" width="184" height="28" rx="14" fill="#F5F3FF"/>
    <text x="771" y="554" fill="#6D28D9" font-family="Inter, ui-sans-serif, system-ui" font-size="12" font-weight="650">third_party 上传降权</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1016" y="392" width="200" height="95" rx="18" fill="#FFFFFF" stroke="#D8E2DC"/>
    <text x="1042" y="431" fill="#0F766E" font-family="Inter, ui-sans-serif, system-ui" font-size="16" font-weight="760">Chroma</text>
    <text x="1042" y="460" fill="#243244" font-family="Inter, ui-sans-serif, system-ui" font-size="13">四类政策 collection</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1016" y="524" width="200" height="102" rx="18" fill="#FFFFFF" stroke="#D8E2DC"/>
    <text x="1042" y="562" fill="#B45309" font-family="Inter, ui-sans-serif, system-ui" font-size="16" font-weight="760">SiliconFlow</text>
    <text x="1042" y="591" fill="#243244" font-family="Inter, ui-sans-serif, system-ui" font-size="13">Embedding / Rerank</text>
    <text x="1042" y="614" fill="#64748B" font-family="Inter, ui-sans-serif, system-ui" font-size="12">服务端配置，不走 BYOK</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="724" y="626" width="252" height="88" rx="18" fill="#FFFFFF" stroke="#D8E2DC"/>
    <text x="752" y="664" fill="#7C3AED" font-family="Inter, ui-sans-serif, system-ui" font-size="16" font-weight="760">LLM Provider</text>
    <text x="752" y="693" fill="#243244" font-family="Inter, ui-sans-serif, system-ui" font-size="13">OpenAI-compatible 对话模型</text>
  </g>

  <path d="M300 236H356" stroke="#405166" stroke-width="2.4" marker-end="url(#arrow)"/>
  <path d="M644 235H713" stroke="#405166" stroke-width="2.4" marker-end="url(#arrow)"/>
  <path d="M504 352C434 386 338 405 242 424" stroke="#405166" stroke-width="2.4" marker-end="url(#arrow)"/>
  <path d="M319 495H372" stroke="#405166" stroke-width="2.4" marker-end="url(#arrow)"/>
  <path d="M637 497H714" stroke="#405166" stroke-width="2.4" marker-end="url(#arrow)"/>
  <path d="M850 344V410" stroke="#405166" stroke-width="2.4" marker-end="url(#arrow)"/>
  <path d="M976 463H1006" stroke="#64748B" stroke-width="2.2" marker-end="url(#softArrow)"/>
  <path d="M976 536C994 548 1001 559 1006 575" stroke="#64748B" stroke-width="2.2" marker-end="url(#softArrow)"/>
  <path d="M850 578V616" stroke="#405166" stroke-width="2.4" marker-end="url(#arrow)"/>
  <path d="M850 626V588" stroke="#64748B" stroke-width="2" marker-end="url(#softArrow)"/>

  <text x="64" y="704" fill="#6B7280" font-family="Inter, ui-sans-serif, system-ui" font-size="13">Runtime trace keeps every turn explainable: user answer → policy/RAG context → evidence review → governor decision → next question/report.</text>
</svg>
