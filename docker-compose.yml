services:
  ds160-agent2:
    build: .
    image: ds160-agent2:latest
    container_name: ds160-agent2
    ports:
      - "${WEB_PORT:-3000}:3000"
    environment:
      APP_AUTH_PASSWORD: ${APP_AUTH_PASSWORD:-}
      APP_AUTH_TOKEN_TTL_SECONDS: ${APP_AUTH_TOKEN_TTL_SECONDS:-86400}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      DATABASE_URL: sqlite:////data/app.sqlite3
      PARSE_WORKER_INLINE: ${PARSE_WORKER_INLINE:-1}
    volumes:
      - ds160-agent2-data:/data
    restart: unless-stopped

volumes:
  ds160-agent2-data:
